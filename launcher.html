<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Studio</title>
    <style>
      body {
        width: 220px;
        margin: 0;
        padding: 12px;
        background: #f5f7f8;
        color: #172126;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        line-height: 1.3;
      }

      button {
        width: 100%;
        border: 1px solid #16756f;
        border-radius: 6px;
        padding: 9px 10px;
        background: #16756f;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
      }

      p {
        min-height: 18px;
        margin: 8px 0 0;
        color: #64727a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Prompt Studio</h1>
    <button id="openPanel" type="button">打开页面面板</button>
    <p id="status"></p>
    <script src="src/launcher.js"></script>
  </body>
</html>
